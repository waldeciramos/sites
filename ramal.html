<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central de Ramais — Grupo Dom Pedro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════
   TOKENS — LIGHT
══════════════════════════════════ */
:root {
  --bg: #f0f2f8;
  --bg2: #e8eaf4;
  --glass: rgba(255,255,255,0.72);
  --glass-h: rgba(255,255,255,0.88);
  --glass-b: rgba(255,255,255,0.95);
  --surface: rgba(255,255,255,0.85);
  --surface2: rgba(248,249,254,0.9);
  --surface3: rgba(240,242,252,0.95);
  --border: rgba(100,110,180,0.13);
  --border2: rgba(100,110,180,0.22);
  --border-b: rgba(61,90,241,0.3);
  --text: #0e1128;
  --text2: #3d4468;
  --text3: #8892bb;
  --text4: #b4bcd8;
  --accent: #3d5af1;
  --accent2: #2a3fb3;
  --accent3: #5b7cff;
  --accent-gl: rgba(61,90,241,0.1);
  --accent-gl2: rgba(61,90,241,0.16);
  --green: #10b981;
  --green-gl: rgba(16,185,129,0.1);
  --amber: #f59e0b;
  --amber-gl: rgba(245,158,11,0.1);
  --red: #ef4444;
  --red-gl: rgba(239,68,68,0.1);
  --purple: #8b5cf6;
  --purple-gl: rgba(139,92,246,0.1);
  --sw: 264px;
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
  --r-xxl: 24px;
  --ease: cubic-bezier(.4,0,.2,1);
  --ease-spring: cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"] {
  --bg: #080b18;
  --bg2: #0d1024;
  --glass: rgba(15,20,45,0.75);
  --glass-h: rgba(20,28,60,0.88);
  --glass-b: rgba(22,30,64,0.96);
  --surface: rgba(18,24,52,0.85);
  --surface2: rgba(22,30,60,0.9);
  --surface3: rgba(28,38,72,0.95);
  --border: rgba(100,120,220,0.12);
  --border2: rgba(120,140,255,0.2);
  --border-b: rgba(91,124,246,0.4);
  --text: #e8ecfa;
  --text2: #8898cc;
  --text3: #4a5580;
  --text4: #2d3560;
  --accent: #5b7cf6;
  --accent2: #7a9aff;
  --accent3: #4060d8;
  --accent-gl: rgba(91,124,246,0.12);
  --accent-gl2: rgba(91,124,246,0.2);
  --green: #34d399;
  --green-gl: rgba(52,211,153,0.1);
  --amber: #fbbf24;
  --amber-gl: rgba(251,191,36,0.1);
  --red: #f87171;
  --red-gl: rgba(248,113,113,0.1);
  --purple: #a78bfa;
  --purple-gl: rgba(167,139,250,0.1);
}

*,*::before,*::after { box-sizing:border-box;margin:0;padding:0 }
html { font-size:15px;scroll-behavior:smooth }
body {
  font-family:'Inter',system-ui,sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height:100vh;
  line-height:1.6;
  transition: background .3s var(--ease), color .3s var(--ease);
  overflow-x: hidden;
}

/* Animated mesh background */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(61,90,241,.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,.09) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16,185,129,.05) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}
[data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%, rgba(61,90,241,.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 110%, rgba(139,92,246,.14) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%, rgba(16,185,129,.07) 0%, transparent 70%);
}

a { color:inherit;text-decoration:none }
button { font-family:inherit;cursor:pointer }

/* ══════════════════════════════════
   LIQUID GLASS MIXIN
══════════════════════════════════ */
.glass {
  background: var(--glass);
  backdrop-filter: blur(20px) saturate(1.6);
  -webkit-backdrop-filter: blur(20px) saturate(1.6);
  border: 1px solid var(--border);
}
.glass-b {
  background: var(--glass-b);
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  border: 1px solid var(--border2);
}

/* ══════════════════════════════════
   LAYOUT
══════════════════════════════════ */
.layout { display:flex;min-height:100vh;position:relative;z-index:1 }

/* ══════════════════════════════════
   SIDEBAR
══════════════════════════════════ */
.sidebar {
  width: var(--sw);
  flex-shrink:0;
  background: var(--glass);
  backdrop-filter: blur(28px) saturate(1.8);
  -webkit-backdrop-filter: blur(28px) saturate(1.8);
  border-right: 1px solid var(--border);
  display:flex;
  flex-direction:column;
  position:sticky;
  top:0;
  height:100vh;
  overflow-y:auto;
  overflow-x:hidden;
  z-index:200;
}
.sidebar::-webkit-scrollbar { width:3px }
.sidebar::-webkit-scrollbar-thumb { background:var(--border2);border-radius:4px }

.sb-head { padding:20px 16px 14px;border-bottom:1px solid var(--border) }
.sb-brand { display:flex;align-items:center;gap:10px;margin-bottom:12px }
.brand-icon {
  width:38px;height:38px;
  border-radius:12px;
  background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
  box-shadow: 0 4px 16px rgba(61,90,241,.35), 0 0 0 1px rgba(255,255,255,.2) inset;
  position:relative;
  overflow:hidden;
}
.brand-icon::after {
  content:'';position:absolute;inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,.3) 0%, transparent 60%);
  border-radius:inherit;
}
.brand-co { font-size:9.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em }
.brand-nm { font-size:14.5px;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-top:1px }
.sb-badge {
  display:inline-flex;align-items:center;gap:5px;
  background: var(--accent-gl);
  color:var(--accent);
  font-size:9.5px;font-weight:700;
  padding:4px 10px;border-radius:20px;
  border:1px solid var(--accent-gl2);
  letter-spacing:.06em;
}

.nav-sec {
  padding:16px 14px 5px;
  font-size:9.5px;font-weight:700;color:var(--text3);
  letter-spacing:.12em;text-transform:uppercase;
  display:flex;align-items:center;gap:6px;
}
.nav-sec::after { content:'';flex:1;height:1px;background:var(--border) }

.nav-item {
  display:flex;align-items:center;gap:9px;
  padding:8px 11px;margin:1px 8px;
  border-radius:10px;cursor:pointer;
  font-size:12.5px;font-weight:500;color:var(--text2);
  transition: all .18s var(--ease);
  border:none;background:none;
  width:calc(100% - 16px);text-align:left;
  position:relative;
}
.nav-item:hover {
  background: var(--accent-gl);
  color: var(--text);
}
.nav-item.active {
  background: linear-gradient(135deg, var(--accent-gl2) 0%, rgba(139,92,246,.1) 100%);
  color: var(--accent);
  font-weight:600;
  border:1px solid var(--accent-gl2);
}
.nav-item.active::before {
  content:'';position:absolute;left:-1px;top:25%;bottom:25%;
  width:3px;border-radius:0 3px 3px 0;
  background: linear-gradient(180deg, var(--accent), var(--purple));
}
.nav-ico { font-size:15px;width:19px;text-align:center;flex-shrink:0 }
.nav-bdg {
  margin-left:auto;font-size:9.5px;font-weight:700;
  background:var(--surface3);color:var(--text3);
  padding:2px 7px;border-radius:20px;min-width:22px;text-align:center;
}
.nav-item.active .nav-bdg { background:var(--accent-gl2);color:var(--accent) }

.sb-foot {
  margin-top:auto;padding:14px 14px 16px;
  border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.kbd {
  background:var(--surface3);border:1px solid var(--border2);
  border-radius:5px;padding:2px 7px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--text3);
}
.theme-btn {
  width:32px;height:32px;border-radius:9px;
  border:1px solid var(--border2);
  background:var(--surface3);color:var(--text2);
  font-size:15px;display:flex;align-items:center;justify-content:center;
  transition:all .18s var(--ease);
}
.theme-btn:hover { background:var(--accent-gl2);color:var(--accent);border-color:var(--border-b) }

/* ══════════════════════════════════
   MAIN
══════════════════════════════════ */
.main { flex:1;display:flex;flex-direction:column;min-width:0 }

/* ══════════════════════════════════
   TOPBAR
══════════════════════════════════ */
.topbar {
  background: var(--glass);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-bottom:1px solid var(--border);
  padding:12px 22px;
  display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;
}

/* Search */
.sw { flex:1;position:relative;max-width:540px }
.search-wrap {
  position:relative;
  background: var(--glass-b);
  backdrop-filter: blur(16px);
  border: 1.5px solid var(--border2);
  border-radius:14px;
  overflow:hidden;
  transition: all .2s var(--ease);
  box-shadow: 0 2px 12px rgba(0,0,0,.06);
}
.search-wrap:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-gl), 0 2px 12px rgba(61,90,241,.12);
}
.search-ico {
  position:absolute;left:13px;top:50%;transform:translateY(-50%);
  color:var(--text3);font-size:14px;pointer-events:none;
  transition: color .2s;
}
.search-wrap:focus-within .search-ico { color:var(--accent) }
#sInput {
  width:100%;height:42px;
  background:transparent;border:none;
  color:var(--text);font-family:'Inter',sans-serif;font-size:13.5px;
  padding:0 38px 0 40px;outline:none;
}
#sInput::placeholder { color:var(--text3) }
.search-kbd {
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  display:flex;gap:3px;align-items:center;pointer-events:none;
  transition: opacity .15s;
}
.search-wrap:focus-within .search-kbd { opacity:0 }
.sclear {
  position:absolute;right:8px;top:50%;transform:translateY(-50%);
  background:var(--surface3);border:none;color:var(--text3);
  width:22px;height:22px;border-radius:50%;cursor:pointer;
  font-size:10px;display:none;align-items:center;justify-content:center;
  transition:all .15s var(--ease);
}
.sclear:hover { background:var(--red-gl);color:var(--red) }
.sclear.on { display:flex }
.sclear.on ~ .search-kbd { display:none }

/* Search results dropdown */
.search-results-wrap { position:relative }
#searchDrop {
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--glass-b);
  backdrop-filter:blur(24px) saturate(1.8);
  border:1px solid var(--border2);
  border-radius:16px;
  box-shadow:0 16px 48px rgba(0,0,0,.16);
  z-index:500;
  max-height:360px;overflow-y:auto;
  display:none;
  animation: dropIn .18s var(--ease-spring);
}
#searchDrop.open { display:block }
@keyframes dropIn {
  from { opacity:0;transform:translateY(-8px) scale(.98) }
  to { opacity:1;transform:translateY(0) scale(1) }
}
.sd-header {
  padding:10px 14px 8px;
  font-size:10px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;
  border-bottom:1px solid var(--border);
}
.sd-item {
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;cursor:pointer;
  transition:background .12s;
  border-bottom:1px solid var(--border);
}
.sd-item:last-child { border-bottom:none }
.sd-item:hover { background:var(--accent-gl) }
.sd-av {
  width:32px;height:32px;border-radius:9px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:#fff;letter-spacing:-.02em;
}
.sd-body { flex:1;min-width:0 }
.sd-nome { font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
.sd-meta { font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis }
.sd-ramal {
  font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;
  padding:3px 9px;border-radius:8px;flex-shrink:0;
  background:var(--accent-gl2);color:var(--accent);
  border:1px solid var(--accent-gl2);
}
.sd-empty { padding:20px;text-align:center;color:var(--text3);font-size:13px }

.tr { display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0 }

.vtog {
  display:flex;gap:3px;
  background:var(--surface3);
  padding:3px;border-radius:10px;
  border:1px solid var(--border);
}
.vbtn {
  width:30px;height:28px;border-radius:7px;border:none;
  background:none;color:var(--text3);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s var(--ease);cursor:pointer;
}
.vbtn.active {
  background:var(--glass-b);color:var(--accent);
  box-shadow:0 1px 6px rgba(0,0,0,.1);border:1px solid var(--border2);
}

/* Liquid Buttons */
.btn {
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px;border-radius:12px;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;border:none;
  transition:all .18s var(--ease);
  position:relative;overflow:hidden;
  white-space:nowrap;
}
.btn::after {
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.2) 0%,transparent 60%);
  border-radius:inherit;pointer-events:none;
}
.btn-p {
  background: linear-gradient(135deg, var(--accent) 0%, var(--purple) 100%);
  color:#fff;
  box-shadow: 0 4px 16px rgba(61,90,241,.3), 0 0 0 1px rgba(255,255,255,.15) inset;
}
.btn-p:hover {
  transform:translateY(-1px);
  box-shadow: 0 6px 22px rgba(61,90,241,.4), 0 0 0 1px rgba(255,255,255,.2) inset;
}
.btn-p:active { transform:translateY(0);transition-duration:.07s }
.btn-sm { padding:6px 13px;font-size:12px;border-radius:9px }
.btn-g {
  background:var(--glass-b);color:var(--text2);
  border:1px solid var(--border2);
  backdrop-filter:blur(12px);
}
.btn-g:hover { background:var(--surface2);color:var(--text);border-color:var(--border-b) }
.btn-s { background:var(--surface3);color:var(--text2);border:1px solid var(--border) }
.btn-s:hover { background:var(--surface2);color:var(--text) }
.btn-d {
  background: var(--red-gl);color:var(--red);
  border:1px solid rgba(239,68,68,.2);
}
.btn-d:hover { filter:brightness(.9) }

/* ══════════════════════════════════
   STATUS BAR
══════════════════════════════════ */
.sbar {
  display:flex;align-items:center;gap:8px;
  padding:7px 22px;
  background:var(--glass);
  backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  font-size:11.5px;color:var(--text3);
}
.sbar-dot { width:7px;height:7px;border-radius:50%;flex-shrink:0 }
.sbar-dot.ok { background:var(--green) }
.sbar-dot.saving { background:var(--amber);animation:pulse 1s infinite }
.sbar-dot.err { background:var(--red) }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ══════════════════════════════════
   CONTENT
══════════════════════════════════ */
.content { padding:20px 22px;flex:1 }

/* ══════════════════════════════════
   STATS CARDS
══════════════════════════════════ */
.stats-row { display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px }
.stat-card {
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.5);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:14px 16px;
  display:flex;align-items:center;gap:12px;
  transition:all .2s var(--ease);
  position:relative;overflow:hidden;
}
.stat-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.6),transparent);
}
.stat-card:hover { transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);border-color:var(--border2) }
.stat-ico {
  width:40px;height:40px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;flex-shrink:0;
  position:relative;
}
.stat-ico::after {
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.4) 0%,transparent 60%);
}
.stat-lbl { font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase }
.stat-val { font-size:24px;font-weight:800;color:var(--text);letter-spacing:-.04em;line-height:1.1;margin:2px 0 }
.stat-sub { font-size:11px;color:var(--text3) }

/* ══════════════════════════════════
   SECTION LABEL / SEARCH INFO
══════════════════════════════════ */
.view-label {
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.view-label-txt {
  font-size:11px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.1em;
}
.view-label::after { content:'';flex:1;height:1px;background:var(--border) }
.smeta {
  display:inline-flex;align-items:center;gap:6px;
  font-size:12.5px;color:var(--text3);
  background:var(--accent-gl);border:1px solid var(--accent-gl2);
  border-radius:20px;padding:4px 12px;margin-bottom:14px;
}

/* ══════════════════════════════════
   PREDIO
══════════════════════════════════ */
.predio-block { margin-bottom:28px }
.predio-hd {
  background:var(--glass);
  backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:var(--r-xl);
  padding:14px 18px;margin-bottom:14px;
  display:flex;align-items:center;gap:14px;
  position:relative;overflow:hidden;
}
.predio-hd::before {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
}
.predio-ico {
  width:46px;height:46px;border-radius:14px;
  background:linear-gradient(135deg, var(--accent), var(--purple));
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;
  box-shadow:0 4px 16px rgba(61,90,241,.3);
  position:relative;
}
.predio-ico::after {
  content:'';position:absolute;inset:0;border-radius:inherit;
  background:linear-gradient(135deg,rgba(255,255,255,.35) 0%,transparent 55%);
}
.predio-info { flex:1;min-width:0 }
.predio-nome { font-size:15.5px;font-weight:800;color:var(--text);letter-spacing:-.02em;margin-bottom:4px }
.predio-meta { display:flex;flex-wrap:wrap;gap:12px }
.predio-mi { display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2) }

/* ══════════════════════════════════
   SETOR
══════════════════════════════════ */
.setor-block {
  background:var(--glass);
  backdrop-filter:blur(20px) saturate(1.4);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:10px;
  transition:all .2s var(--ease);
}
.setor-block:hover { border-color:var(--border2);box-shadow:0 4px 20px rgba(0,0,0,.08) }

.setor-hd {
  padding:13px 16px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid transparent;
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.setor-hd:hover { background:var(--accent-gl) }
.setor-block.open .setor-hd { border-bottom-color:var(--border) }

.setor-ico {
  width:34px;height:34px;border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex-shrink:0;
}
.setor-tg { flex:1;min-width:0 }
.setor-nome { font-size:13.5px;font-weight:700;color:var(--text);letter-spacing:-.01em }
.setor-sub { display:flex;flex-wrap:wrap;gap:8px;margin-top:2px }
.setor-mi { display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace }

.p3 { background:rgba(245,158,11,.12);color:var(--amber);border:1px solid rgba(245,158,11,.25) }

.setor-block.open .setor-arr { background:var(--accent-gl2);color:var(--accent);border-color:var(--border-b) }

/* ══════════════════════════════════

══════════════════════════════════ */
.collabs-wrap { padding:12px 14px }
.cgrid { display:grid;grid-template-columns:repeat(auto-fill,minmax(275px,1fr));gap:10px }
.cgrid.list { grid-template-columns:1fr }

.ccard {
  background:var(--glass-b);
  backdrop-filter:blur(16px);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  padding:13px;
  display:flex;align-items:flex-start;gap:11px;

}
.ccard::before {
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:transparent;transition:background .2s;border-radius:3px 0 0 3px;
}
.ccard::after {
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent);
}
.ccard:hover {
  border-color:var(--border-b);
  box-shadow:0 8px 28px rgba(0,0,0,.1);

}

.avatar {

  box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.avatar::after {
  content:'';position:absolute;inset:0;border-radius:inherit;

}

.cbody { flex:1;min-width:0 }

.cfields { display:flex;flex-direction:column;gap:3px;margin-top:3px }
.cfield { display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis }

.frow { display:grid;grid-template-columns:1fr 1fr;gap:12px }

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
#toasts { position:fixed;bottom:22px;right:22px;z-index:2000;display:flex;flex-direction:column;gap:7px }
.toast {
  background:var(--glass-b);
  backdrop-filter:blur(20px);
  border:1px solid var(--border2);
  border-radius:var(--r);
  padding:11px 15px;font-size:12.5px;color:var(--text);

  display:flex;align-items:center;gap:9px;

}
.toast.success { border-left:3px solid var(--green) }
.toast.error { border-left:3px solid var(--red) }
.toast.info { border-left:3px solid var(--accent) }
@keyframes tIn { from{transform:translateX(50px) scale(.95);opacity:0} to{transform:translateX(0) scale(1);opacity:1} }
@keyframes tOut { to{transform:translateX(50px) scale(.95);opacity:0} }

/* ══════════════════════════════════

══════════════════════════════════ */
::-webkit-scrollbar { width:5px;height:5px }

mark { background:rgba(61,90,241,.15);color:var(--accent);border-radius:2px;padding:0 1px }

<script>
/* ════════════════════════════════════════
   ⚙️  CONFIG JSONBin
════════════════════════════════════════ */
const JB_MASTER_KEY = '$2a$10$lFTdWh/opLn8wg1UFKGyHe.YaOZINd4D2qnk2qGd0PFbv.Yz686Qm';
const JB_ACCESS_KEY = '$2a$10$eqC8ucHjOTUCijJGsw6YZeT16qAa6ybBCk2BmJdMwioIvoybhrBru';
const JB_BIN_ID     = '6a2ac3d9da38895dfeadf3b3';
const JB_API        = `https://api.jsonbin.io/v3/b/${JB_BIN_ID}`;

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
let DATA = null;
let cView = 'todos', cSearch = '', cPiso = null, VM = 'grid';
const openStates = new Set();

const COLORS = ['#3d5af1','#10b981','#f59e0b','#ef4444','#8b5cf6','#06b6d4','#ec4899','#0ea5e9'];
const ICONS = {recepcao:'🪪',marketing:'📢',suprimentos:'📦',tecnologia:'💻',ti:'💻',financeiro:'💰',contabil:'📊',fiscal:'📑',cartoes:'💳',faturamento:'📋',juridico:'⚖️',pessoal:'👥',recursos:'🤝',saude:'🏥',sst:'🦺',controladoria:'🎯',coordenadoria:'📌',combustiveis:'⛽',programacao:'🖥️',gestao:'📈',orgaos:'🏛️',alugueis:'🏠',bv:'🚚',xp:'🚛',assessora:'🗒️',recebiveis:'💹',plano:'🩺',default:'🏷️'};

function sIcon(nome){ const n=nome.toLowerCase(); for(const k of Object.keys(ICONS)) if(n.includes(k)) return ICONS[k]; return ICONS.default; }
function ini(nome){ return nome.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }
function aColor(nome){ let h=0; for(let c of nome) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h]; }
function greeting(){ const h=new Date().getHours(); return h>=5&&h<12?'Bom dia':h>=12&&h<18?'Boa tarde':'Boa noite'; }
function firstN(email){ if(!email||email==='-') return ''; const p=email.split('@')[0].split(/[._]/)[0]; return p.charAt(0).toUpperCase()+p.slice(1); }
function mailto(email){ if(!email||email==='-') return null; const fn=firstN(email); const body=fn?`${greeting()}, ${fn}!\n\n`:`${greeting()}!\n\n`; return `mailto:${email}?body=${encodeURIComponent(body)}`; }

/* ════════════════════════════════════════
   STATUS
════════════════════════════════════════ */
function setStatus(state, msg){
  document.getElementById('sbar-dot').className='sbar-dot '+state;
  document.getElementById('sbar-txt').textContent=msg;
}

/* ════════════════════════════════════════
   JSONBin — LEITURA
════════════════════════════════════════ */
async function loadFromGitHub(){
  setStatus('saving','Carregando ramais do JSONBin…');
  try{
    const res = await fetch(JB_API+'/latest',{headers:{'X-Master-Key':JB_MASTER_KEY,'X-Access-Key':JB_ACCESS_KEY}});
    if(!res.ok) throw new Error(`JSONBin ${res.status} ${res.statusText}`);
    const json = await res.json();
    DATA = json.record;
    const v = json.metadata?.version ?? '?';
    setStatus('ok',`✅ Dados carregados — v${v}`);
    DATA.predios.forEach(p=>p.setores.forEach(s=>openStates.add(s.id)));
    updateCounts(); render();
  } catch(e){
    setStatus('err','❌ Erro: '+e.message);
    toast('Erro ao carregar: '+e.message,'error');
    const saved=localStorage.getItem('ramais_fallback');
    if(saved){ DATA=JSON.parse(saved); setStatus('err','⚠️ Usando cache local'); DATA.predios.forEach(p=>p.setores.forEach(s=>openStates.add(s.id))); updateCounts(); render(); }
  }
}

/* ════════════════════════════════════════
   JSONBin — ESCRITA
════════════════════════════════════════ */
async function saveToGitHub(){
  if(!DATA) return;
  setStatus('saving','💾 Salvando…');
  try{
    const res = await fetch(JB_API,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':JB_MASTER_KEY,'X-Access-Key':JB_ACCESS_KEY},body:JSON.stringify(DATA)});
    if(!res.ok){ const err=await res.json(); throw new Error(err.message||res.statusText); }
    const result=await res.json();
    const v=result.metadata?.version??'?';
    localStorage.setItem('ramais_fallback',JSON.stringify(DATA));
    setStatus('ok',`✅ Salvo — v${v}`);
    return true;
  } catch(e){
    setStatus('err','❌ Erro ao salvar: '+e.message);
    toast('Erro ao salvar: '+e.message,'error');
    return false;
  }
}

const $si = document.getElementById('sInput');
const $sc = document.getElementById('sclear');
const $drop = document.getElementById('searchDrop');

let searchTimeout = null;

$si.addEventListener('input',()=>{
  cSearch = $si.value.trim();
  $sc.classList.toggle('on', cSearch.length>0);
  clearTimeout(searchTimeout);
  if(cSearch.length >= 2){
    searchTimeout = setTimeout(()=>{ showDrop(); render(); }, 160);
  } else {
    hideDrop();
    if(!cSearch) render();
  }
});

$si.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ clearSearch(); hideDrop(); }
  if(e.key==='Enter'){ hideDrop(); render(); }
});

function showDrop(){
  if(!DATA || cSearch.length < 2){ hideDrop(); return; }
  const results = [];
  DATA.predios.forEach(p=>p.setores.forEach(s=>s.colaboradores.forEach(c=>{
    if(matches(c,s,cSearch)) results.push({predio:p,setor:s,collab:c});
  })));
  if(results.length===0){
    $drop.innerHTML=`<div class="sd-empty">🔍 Sem resultados para "<strong>${esc(cSearch)}</strong>"</div>`;
    $drop.classList.add('open'); return;
  }
  const top = results.slice(0,7);
  let h = `<div class="sd-header">🔎 ${results.length} resultado${results.length!==1?'s':''}</div>`;
  top.forEach(({predio,setor,collab:c})=>{
    const av=ini(c.nome); const col=aColor(c.nome);
    const hasR=c.ramal&&c.ramal!=='-'&&c.ramal!=='—';
    const enc=encodeURIComponent(c.nome);
    h+=`<div class="sd-item" onclick="jumpToCollab('${predio.id}','${setor.id}','${enc}')">
      <div class="sd-av" style="background:${col}">${av}</div>
      <div class="sd-body">
        <div class="sd-nome">${hiText(c.nome,cSearch)}</div>
        <div class="sd-meta">${setor.nome}${c.cargo?' · '+c.cargo:''}</div>
      </div>
      ${hasR?`<div class="sd-ramal">${c.ramal}</div>`:''}
    </div>`;
  });
  if(results.length>7) h+=`<div class="sd-header" style="border-top:1px solid var(--border);cursor:pointer" onclick="hideDrop();render()">Ver todos os ${results.length} resultados →</div>`;
  $drop.innerHTML=h;
  $drop.classList.add('open');
}

function hideDrop(){ $drop.classList.remove('open'); }

document.addEventListener('click',e=>{
  if(!e.target.closest('.sw')) hideDrop();
});

function jumpToCollab(pid,sid,enc){
  hideDrop();
  openStates.add(sid);
  cSearch=''; $si.value=''; $sc.classList.remove('on');
  render();
  setTimeout(()=>{
    const el=document.getElementById('sb-'+sid);
    if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
  },100);
}

function esc(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])) }
function hiText(text,q){
  if(!q||!text) return text||'';
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'),'<mark>$1</mark>');
}

function clearSearch(){ $si.value=''; cSearch=''; $sc.classList.remove('on'); hideDrop(); cPiso=null; render(); }
function matches(c,s,q){ if(!q) return true; const lq=q.toLowerCase(); return [c.nome,c.email,c.ramal,c.cargo,c.telefone,c.subsetor,s.nome,s.email_principal].some(v=>v?.toLowerCase().includes(lq)); }

document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==$si){ e.preventDefault(); $si.focus(); }
  if(e.key==='Escape'){ clearSearch(); closeAllModals(); }
});

/* ════════════════════════════════════════
   RENDER
════════════════════════════════════════ */
function render(){
  if(!DATA) return;
  updateCounts();
  const el=document.getElementById('mainContent');
  let tot=0,sets=0;
  DATA.predios.forEach(p=>{ sets+=p.setores.length; p.setores.forEach(s=>tot+=s.colaboradores.length); });

  let results=[];
  DATA.predios.forEach(predio=>predio.setores.forEach(setor=>{
    if(cPiso&&setor.piso!==cPiso) return;
    setor.colaboradores.forEach(c=>{ if(matches(c,setor,cSearch)) results.push({predio,setor,collab:c}); });
  }));

  /* Stats */
  const statIcos = [
    ['background:rgba(61,90,241,.12)','👥','Colaboradores',tot,`${DATA.predios.length} prédio(s)`],
    ['background:rgba(16,185,129,.12)','🗂️','Setores',sets,'todos os pisos'],
    ['background:rgba(245,158,11,.12)','🔍','Resultados',results.length,cSearch?`"${cSearch}"`:cPiso?`Piso ${cPiso}`:'todos'],
    ['background:rgba(139,92,246,.12)','🏢','Prédios',DATA.predios.length,'unidades'],
  ];
  let html=`<div class="stats-row">`;
  statIcos.forEach(([bg,ico,lbl,val,sub])=>{
    html+=`<div class="stat-card">
      <div class="stat-ico" style="${bg}">${ico}</div>
      <div>
        <div class="stat-lbl">${lbl}</div>
        <div class="stat-val">${val}</div>
        <div class="stat-sub">${sub}</div>
      </div>
    </div>`;
  });
  html+=`</div>`;

  if(cSearch&&results.length===0){
    html+=`<div class="empty"><div class="empty-ico">🔍</div><h3>Sem resultados para "${esc(cSearch)}"</h3><p>Tente outro nome, ramal ou e-mail.</p></div>`;
    el.innerHTML=html; return;
  }

  if(cSearch){
    html+=`<div class="smeta">🔎 ${results.length} resultado${results.length!==1?'s':''} para <strong>"${esc(cSearch)}"</strong></div>`;
    const bySe=new Map();
    results.forEach(r=>{ if(!bySe.has(r.setor.id)) bySe.set(r.setor.id,{predio:r.predio,setor:r.setor,collabs:[]}); bySe.get(r.setor.id).collabs.push(r.collab); });
    html+=`<div class="view-label"><span class="view-label-txt">Resultados encontrados</span></div>`;
    bySe.forEach(({predio,setor,collabs})=>{ html+=rSetor(predio,setor,collabs,cSearch); });
  } else if(cView==='setores'){
    const all=[]; DATA.predios.forEach(p=>p.setores.forEach(s=>all.push({predio:p,setor:s}))); all.sort((a,b)=>a.setor.nome.localeCompare(b.setor.nome,'pt'));
    html+=`<div class="view-label"><span class="view-label-txt">Setores A–Z</span></div>`;
    all.forEach(({predio,setor})=>{ if(cPiso&&setor.piso!==cPiso) return; html+=rSetor(predio,setor,setor.colaboradores,''); });
  } else {
    DATA.predios.forEach(predio=>{ if(cPiso&&!predio.setores.some(s=>s.piso===cPiso)) return; html+=rPredio(predio); });
  }

  el.innerHTML=html;
  openStates.forEach(id=>{ const e=document.getElementById('sb-'+id); if(e) e.classList.add('open'); });
}

function toggleSetor(id){
  const e=document.getElementById('sb-'+id); if(!e) return;
  e.classList.toggle('open');
  if(e.classList.contains('open')) openStates.add(id); else openStates.delete(id);
}

function rPredio(predio){
  let h=`<div class="predio-block">
    <div class="predio-hd">
      <div class="predio-ico">🏢</div>
      <div class="predio-info">
        <div class="predio-nome">${predio.nome}</div>
        <div class="predio-meta">`;
  if(predio.telefone_principal) h+=`<div class="predio-mi">📞 ${predio.telefone_principal}</div>`;
  if(predio.sac_cliente) h+=`<div class="predio-mi">🎧 SAC Cliente: ${predio.sac_cliente}</div>`;
  if(predio.sac_funcionarios) h+=`<div class="predio-mi">📱 SAC Func.: ${predio.sac_funcionarios}</div>`;
  h+=`</div></div>
    </div>`;
  let fil=predio.setores; if(cPiso) fil=fil.filter(s=>s.piso===cPiso);
  fil.forEach(s=>{ h+=rSetor(predio,s,s.colaboradores,''); });
  h+=`</div>`; return h;
}

function rSetor(predio,setor,collabs,q){
  const p=setor.piso; const pc=p?`p${p}`:'pn'; const pl=p?`Piso ${p}`:'—'; const pi={'1':'🟢','2':'🔵','3':'🟡'}[p]||'⬜';
  const ico=sIcon(setor.nome);
  const ibg={'1':'background:rgba(16,185,129,.1)','2':'background:rgba(61,90,241,.1)','3':'background:rgba(245,158,11,.1)'}[p]||'background:var(--surface3)';
  const isOpen=openStates.has(setor.id)||!!q;
  let h=`<div class="setor-block${isOpen?' open':''}" id="sb-${setor.id}">
    <div class="setor-hd" onclick="toggleSetor('${setor.id}')">
      <div class="setor-ico" style="${ibg}">${ico}</div>
      <div class="setor-tg">
        <div class="setor-nome">${hiText(setor.nome,q)}</div>
        <div class="setor-sub">`;
  if(setor.email_principal) h+=`<span class="setor-mi">✉️ <a href="mailto:${setor.email_principal}" onclick="event.stopPropagation()">${hiText(setor.email_principal,q)}</a></span>`;
  if(setor.telefone_principal) h+=`<span class="setor-mi">📞 ${setor.telefone_principal}</span>`;
  h+=`</div></div>
      <span class="piso-bdg ${pc}">${pi} ${pl}</span>
      <span class="setor-cnt">${collabs.length} pessoa${collabs.length!==1?'s':''}</span>
      <div class="setor-arr"><span class="arr-ico">▾</span></div>
    </div>`;
  if(isOpen){
    h+=`<div class="collabs-wrap">`;
    if(collabs.length===0){
      h+=`<p style="color:var(--text3);font-size:13px;padding:4px 0">Nenhum colaborador. <button class="btn btn-g btn-sm" onclick="openNewCollabForSetor('${predio.id}','${setor.id}')">＋ Adicionar</button></p>`;
    } else {
      h+=`<div class="cgrid${VM==='list'?' list':''}">`;
      collabs.forEach(c=>{ h+=rCard(predio.id,setor.id,c,q); });
      h+=`</div>`;
    }
    h+=`<div class="setor-acts">
      <button class="btn btn-g btn-sm" onclick="openNewCollabForSetor('${predio.id}','${setor.id}')">＋ Colaborador</button>
      <button class="btn btn-g btn-sm" onclick="openEditSetor('${predio.id}','${setor.id}')">✏️ Editar setor</button>
      <button class="btn btn-g btn-sm" style="color:var(--red);border-color:rgba(239,68,68,.2)" onclick="confirmDelSetor('${predio.id}','${setor.id}')">🗑️ Remover</button>
    </div></div>`;
  }
  h+=`</div>`; return h;
}

function rCard(pid,sid,c,q){
  const av=ini(c.nome); const col=aColor(c.nome); const hasR=c.ramal&&c.ramal!=='-'&&c.ramal!=='—';
  const ml=mailto(c.email);
  let fields='';
  if(c.email&&c.email!=='-'){ fields+=`<div class="cfield"><span class="fi">✉️</span>`; if(ml) fields+=`<a href="${ml}" title="${greeting()}, ${firstN(c.email)}!">${hiText(c.email,q)}</a>`; else fields+=`<span>${hiText(c.email,q)}</span>`; fields+=`</div>`; }
  if(c.telefone) fields+=`<div class="cfield"><span class="fi">📱</span><a href="tel:${c.telefone}">${c.telefone}</a></div>`;
  if(c.subsetor) fields+=`<div class="cfield"><span class="fi">📂</span><span>${esc(c.subsetor)}</span></div>`;
  const en=c.nome.replace(/'/g,"\\'");
  return `<div class="ccard">
    <div class="avatar" style="background:${col}">${av}</div>
    <div class="cbody">
      <div class="cnome">${hiText(c.nome,q)}</div>
      ${c.cargo?`<div class="ccargo">🏷️ ${hiText(c.cargo,q)}</div>`:''}
      <div class="cfields">${fields}</div>
    </div>
    <div class="cactions">
      <div class="rchip ${hasR?'has':'no'}">${c.ramal||'—'}</div>
      <div style="display:flex;gap:3px;margin-top:4px">
        <button class="icobtn e" onclick="openEditCollab('${pid}','${sid}','${en}')" title="Editar">✏️</button>
        <button class="icobtn d" onclick="confirmDelCollab('${pid}','${sid}','${en}')" title="Remover">🗑️</button>
      </div>
    </div>
  </div>`;
}

function openEditCollab(pid,sid,nome){

async function saveCollab(){
  const nome=document.getElementById('fn').value.trim(); if(!nome){ toast('Nome é obrigatório.','error'); return; }
  const sv=document.getElementById('fsetor').value; if(!sv){ toast('Selecione um setor.','error'); return; }
  const [pid,sid]=sv.split('|'); const oldKey=document.getElementById('eSetorKey').value; const oldNome=document.getElementById('eId').value;
  const nc={nome,ramal:document.getElementById('fr').value.trim()||'-',email:document.getElementById('fe').value.trim()||'-'};
  const cargo=document.getElementById('fc').value.trim(); const tel=document.getElementById('ft').value.trim(); const sub=document.getElementById('fsub').value.trim();
  if(cargo) nc.cargo=cargo; if(tel) nc.telefone=tel; if(sub) nc.subsetor=sub;
  if(oldNome){ const [op,os]=oldKey.split('|'); const oP=DATA.predios.find(x=>x.id===op); const oS=oP?.setores.find(x=>x.id===os); if(oS) oS.colaboradores=oS.colaboradores.filter(c=>c.nome!==oldNome); }
  const p=DATA.predios.find(x=>x.id===pid); const s=p?.setores.find(x=>x.id===sid); if(!s) return;
  if(oldNome&&oldKey===sv){ const i=s.colaboradores.findIndex(c=>c.nome===oldNome); if(i>=0) s.colaboradores[i]=nc; else s.colaboradores.push(nc); } else s.colaboradores.push(nc);
  closeModal('mCollab'); render();
  const ok=await saveToGitHub();
  if(ok) toast(oldNome?'✅ Colaborador atualizado!':'✅ Colaborador adicionado!','success');
}
function confirmDelCollab(pid,sid,nome){
  document.getElementById('cName').textContent=nome;
  document.getElementById('cBtn').onclick=async()=>{
    const p=DATA.predios.find(x=>x.id===pid); const s=p?.setores.find(x=>x.id===sid);
    if(s){ s.colaboradores=s.colaboradores.filter(c=>c.nome!==nome); closeModal('mConfirm'); render(); const ok=await saveToGitHub(); if(ok) toast('Colaborador removido.','info'); }
  };
  openModal('mConfirm');
}

async function saveSetor(){
  const nome=document.getElementById('sfn').value.trim(); if(!nome){ toast('Nome do setor é obrigatório.','error'); return; }
  const pid=document.getElementById('sfpredio').value; if(!pid){ toast('Selecione um prédio.','error'); return; }

  if(editId){ const oP=DATA.predios.find(x=>x.id===oldPid); if(oP){ const i=oP.setores.findIndex(x=>x.id===editId); if(i>=0){ ns.colaboradores=oP.setores[i].colaboradores; if(oldPid===pid){oP.setores[i]=ns;}else{oP.setores.splice(i,1);p.setores.push(ns);} } } } else p.setores.push(ns);
  closeModal('mSetor'); render();

  if(ok) toast(editId?'✅ Setor atualizado!':'✅ Setor adicionado!','success');
}
function confirmDelSetor(pid,sid){
  const p=DATA.predios.find(x=>x.id===pid); const s=p?.setores.find(x=>x.id===sid); if(!s) return;
  document.getElementById('cName').textContent=`o setor "${s.nome}"`;
  document.getElementById('cBtn').onclick=async()=>{ p.setores=p.setores.filter(x=>x.id!==sid); closeModal('mConfirm'); render(); const ok=await saveToGitHub(); if(ok) toast('Setor removido.','info'); };
  openModal('mConfirm');
}

/* ════════════════════════════════════════
   EXPORT
════════════════════════════════════════ */
function exportJSON(){
  const b=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b); const a=document.createElement('a');
  a.href=u; a.download='ramais.json'; a.click(); URL.revokeObjectURL(u);
  toast('💾 JSON exportado!','success');
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
function toast(msg,type='info'){
  const icons={success:'✅',error:'❌',info:'ℹ️'};
  const el=document.createElement('div'); el.className=`toast ${type}`;
  el.innerHTML=`<span>${icons[type]}</span>${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(()=>{ el.style.animation='tOut .3s forwards'; setTimeout(()=>el.remove(),300); },4000);
}

   INIT
════════════════════════════════════════ */
loadTheme();
loadFromGitHub();
