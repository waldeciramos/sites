<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 DOM PEDRO - Análise de Tanques</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: #0f3460; color: white; padding: 25px; border-radius: 15px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid #e94560; }
        .header h1 { font-size: 1.8em; }
        .header p { opacity: 0.8; margin-top: 5px; }
        .badge { background: #e94560; display: inline-block; padding: 5px 15px; border-radius: 20px; margin-top: 10px; font-size: 0.8em; }
        .loading { text-align: center; background: white; padding: 50px; border-radius: 15px; margin: 20px 0; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #e94560; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error { background: #f8d7da; color: #721c24; padding: 20px; border-radius: 10px; margin: 20px 0; text-align: center; }
        .success { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin: 10px 0; }
        .summary-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .card { background: white; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .card h4 { color: #666; font-size: 0.8em; margin-bottom: 8px; }
        .card .value { font-size: 1.8em; font-weight: bold; color: #e94560; }
        .card .value.negative { color: #dc3545; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px; margin-top: 20px; }
        .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .chart-card h3 { color: #e94560; margin-bottom: 15px; border-bottom: 2px solid #e94560; display: inline-block; padding-bottom: 5px; }
        .chart-container { height: 300px; }
        .footer { text-align: center; color: rgba(255,255,255,0.5); margin-top: 20px; font-size: 0.8em; }
        @media (max-width: 768px) {
            .charts-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.3em; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⛽ REDE DOM PEDRO DE POSTOS</h1>
        <p>Medição de Tanques por Período - DP 1</p>
        <div class="badge" id="statusBadge">🔄 Carregando dados...</div>
    </div>

    <div id="loadingArea" class="loading">
        <div class="spinner"></div>
        <p>📡 Buscando dados do arquivo posto.csv...</p>
        <p style="font-size: 0.8em; margin-top: 10px;">GitHub: waldeciramos/sites</p>
    </div>

    <div id="contentArea" style="display: none;"></div>

    <div class="footer">
        🔗 Dados carregados do GitHub • Link direto: 
        <a href="https://raw.githubusercontent.com/waldeciramos/sites/main/posto.csv" target="_blank" style="color: #e94560;">posto.csv</a>
    </div>
</div>

<script>
    const CSV_URL = 'https://raw.githubusercontent.com/waldeciramos/sites/main/posto.csv';
    
    async function carregarDados() {
        try {
            console.log('Tentando carregar:', CSV_URL);
            const response = await fetch(CSV_URL);
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const texto = await response.text();
            console.log('Arquivo carregado, tamanho:', texto.length, 'caracteres');
            
            const dados = processarCSV(texto);
            
            if (dados.length === 0) {
                throw new Error('Nenhum dado de medição encontrado no arquivo');
            }
            
            document.getElementById('statusBadge').innerHTML = `✅ ${dados.length} registros carregados`;
            document.getElementById('loadingArea').style.display = 'none';
            
            renderizarDashboard(dados);
            
        } catch (erro) {
            console.error('Erro:', erro);
            document.getElementById('loadingArea').innerHTML = `
                <div class="error">
                    <strong>❌ Erro ao carregar os dados</strong><br><br>
                    Mensagem: ${erro.message}<br><br>
                    <a href="${CSV_URL}" target="_blank" style="color: #e94560;">Clique aqui para testar se o arquivo está acessível</a>
                </div>
            `;
            document.getElementById('statusBadge').innerHTML = '❌ Falha no carregamento';
        }
    }
    
    function processarCSV(texto) {
        const linhas = texto.split(/\r?\n/);
        const resultados = [];
        let combustivelAtual = '';
        
        for (let i = 0; i < linhas.length; i++) {
            const linha = linhas[i];
            
            // Detecta cabeçalho de combustível
            if (linha.includes('Combustível:') && linha.includes('Tanques vinculados')) {
                const match = linha.match(/Combustível:\s*(\d+\s*-\s*[^;]+)/);
                if (match) {
                    combustivelAtual = match[1];
                }
                continue;
            }
            
            // Pula linhas de total
            if (linha.includes('Total acumulado')) continue;
            
            // Processa linha de dados
            const colunas = linha.split(';');
            if (colunas[0] && colunas[0].match(/^\d{4}-\d{2}-\d{2}/)) {
                // Converte número com vírgula e ponto
                const converterNumero = (valor) => {
                    if (!valor || valor === '') return 0;
                    return parseFloat(valor.replace(/\./g, '').replace(',', '.'));
                };
                
                const saidaBombas = converterNumero(colunas[7]);
                const diferenca = converterNumero(colunas[9]);
                const entrada = converterNumero(colunas[3]);
                
                if (saidaBombas > 0 || entrada > 0) {
                    resultados.push({
                        data: colunas[0],
                        combustivel: combustivelAtual || 'Não identificado',
                        saida_bombas: saidaBombas,
                        entrada: entrada,
                        diferenca: isNaN(diferenca) ? 0 : diferenca
                    });
                }
            }
        }
        
        console.log(`Processados ${resultados.length} registros`);
        return resultados;
    }
    
    function renderizarDashboard(dados) {
        // Resumo
        const totalVendas = dados.reduce((s, d) => s + d.saida_bombas, 0);
        const totalDiferenca = dados.reduce((s, d) => s + d.diferenca, 0);
        const dias = [...new Set(dados.map(d => d.data))].length;
        const mediaDiaria = totalVendas / dias;
        
        // Vendas por combustível
        const vendasPorComb = {};
        dados.forEach(d => {
            vendasPorComb[d.combustivel] = (vendasPorComb[d.combustivel] || 0) + d.saida_bombas;
        });
        
        // Vendas por data
        const vendasPorData = {};
        dados.forEach(d => {
            vendasPorData[d.data] = (vendasPorData[d.data] || 0) + d.saida_bombas;
        });
        const datas = Object.keys(vendasPorData).sort();
        const vendasDiarias = datas.map(d => vendasPorData[d]);
        
        // Diferença por data
        const diffPorData = {};
        dados.forEach(d => {
            diffPorData[d.data] = (diffPorData[d.data] || 0) + d.diferenca;
        });
        const diferencasDiarias = datas.map(d => diffPorData[d] || 0);
        
        // Top diferenças
        const topDiffs = [...dados]
            .filter(d => Math.abs(d.diferenca) > 0)
            .sort((a, b) => Math.abs(b.diferenca) - Math.abs(a.diferenca))
            .slice(0, 10);
        
        // Performance por combustível
        const perf = {};
        const count = {};
        dados.forEach(d => {
            if (!perf[d.combustivel]) { perf[d.combustivel] = 0; count[d.combustivel] = 0; }
            perf[d.combustivel] += Math.abs(d.diferenca);
            count[d.combustivel]++;
        });
        
        const html = `
            <div class="summary-cards">
                <div class="card"><h4>⛽ TOTAL VENDIDO</h4><div class="value">${totalVendas.toLocaleString('pt-BR')} L</div></div>
                <div class="card"><h4>📊 DIFERENÇA TOTAL</h4><div class="value ${totalDiferenca < 0 ? 'negative' : ''}">${totalDiferenca.toLocaleString('pt-BR')} L</div></div>
                <div class="card"><h4>📅 DIAS ANALISADOS</h4><div class="value">${dias}</div></div>
                <div class="card"><h4>📈 MÉDIA DIÁRIA</h4><div class="value">${Math.round(mediaDiaria).toLocaleString('pt-BR')} L</div></div>
            </div>
            
            <div class="charts-grid">
                <div class="chart-card"><h3>📈 Evolução Diária de Vendas</h3><div class="chart-container"><canvas id="chartEvolucao"></canvas></div></div>
                <div class="chart-card"><h3>🥧 Distribuição por Combustível</h3><div class="chart-container"><canvas id="chartDistribuicao"></canvas></div></div>
                <div class="chart-card"><h3>⚠️ Top 10 Maiores Diferenças</h3><div class="chart-container"><canvas id="chartTopDiffs"></canvas></div></div>
                <div class="chart-card"><h3>📊 Performance por Combustível</h3><div class="chart-container"><canvas id="chartPerformance"></canvas></div></div>
                <div class="chart-card"><h3>📉 Vendas Diárias (Detalhe)</h3><div class="chart-container"><canvas id="chartVendasDiarias"></canvas></div></div>
                <div class="chart-card"><h3>📏 Diferença Diária (Perda/Ganho)</h3><div class="chart-container"><canvas id="chartDiferencaDiaria"></canvas></div></div>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
        document.getElementById('contentArea').style.display = 'block';
        
        // Criar gráficos
        const cores = ['#e94560', '#0f3460', '#48bb78', '#ed8936', '#6c5ce7', '#fdcb6e'];
        
        new Chart(document.getElementById('chartEvolucao'), {
            type: 'line', data: { labels: datas.slice(-30), datasets: [{ label: 'Vendas (L)', data: vendasDiarias.slice(-30), borderColor: '#e94560', fill: true, tension: 0.3 }] }
        });
        
        new Chart(document.getElementById('chartDistribuicao'), {
            type: 'pie', data: { labels: Object.keys(vendasPorComb), datasets: [{ data: Object.values(vendasPorComb), backgroundColor: cores }] }
        });
        
        new Chart(document.getElementById('chartTopDiffs'), {
            type: 'bar', data: { labels: topDiffs.map(d => `${d.data.substring(5)}`), datasets: [{ label: 'Diferença (L)', data: topDiffs.map(d => d.diferenca), backgroundColor: topDiffs.map(d => d.diferenca >= 0 ? '#48bb78' : '#e94560') }] }
        });
        
        new Chart(document.getElementById('chartPerformance'), {
            type: 'bar', data: { labels: Object.keys(perf), datasets: [{ label: 'Média |Diferença| (L/dia)', data: Object.keys(perf).map(c => perf[c] / count[c]), backgroundColor: '#0f3460' }] }
        });
        
        new Chart(document.getElementById('chartVendasDiarias'), {
            type: 'bar', data: { labels: datas.slice(-20), datasets: [{ label: 'Vendas (L)', data: vendasDiarias.slice(-20), backgroundColor: '#48bb78' }] }
        });
        
        new Chart(document.getElementById('chartDiferencaDiaria'), {
            type: 'bar', data: { labels: datas.slice(-20), datasets: [{ label: 'Diferença (L)', data: diferencasDiarias.slice(-20), backgroundColor: diferencasDiarias.slice(-20).map(v => v >= 0 ? '#48bb78' : '#e94560') }] }
        });
    }
    
    carregarDados();
</script>
</body>
</html>
