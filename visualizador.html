<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Relatório de Tanques - Visualização</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #0f3460, #16213e); color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; }
        .chart-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .chart-card h3 { color: #e94560; margin-bottom: 15px; border-bottom: 2px solid #e94560; display: inline-block; }
        .chart-container { height: 300px; }
        .loading { text-align: center; padding: 50px; color: white; }
        .footer { text-align: center; color: #666; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Relatório de Medição de Tanques</h1>
            <p>Dados atualizados em: <span id="dataAtualizacao">Carregando...</span></p>
        </div>
        <div id="loading" class="loading">📁 Carregando dados do repositório...</div>
        <div id="charts" style="display: none;">
            <div class="charts-grid">
                <div class="chart-card"><h3>📈 Evolução Diária</h3><div class="chart-container"><canvas id="chartEvolucao"></canvas></div></div>
                <div class="chart-card"><h3>🥧 Distribuição por Combustível</h3><div class="chart-container"><canvas id="chartDistribuicao"></canvas></div></div>
                <div class="chart-card"><h3>📊 Top Diferenças</h3><div class="chart-container"><canvas id="chartDiferencas"></canvas></div></div>
                <div class="chart-card"><h3>⛽ Performance por Combustível</h3><div class="chart-container"><canvas id="chartPerformance"></canvas></div></div>
            </div>
        </div>
        <div class="footer">🔒 Dados carregados diretamente do GitHub • Nenhum upload necessário</div>
    </div>

    <script>
        // URL do seu CSV dentro do repositório
        const CSV_URL = 'https://raw.githubusercontent.com/waldeciramos/sites/main/dados/posto.csv';
        
        async function carregarDados() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const dados = processarCSV(text);
                
                document.getElementById('dataAtualizacao').innerText = new Date().toLocaleString('pt-BR');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('charts').style.display = 'block';
                
                gerarGraficos(dados);
            } catch (error) {
                document.getElementById('loading').innerHTML = '❌ Erro ao carregar dados. Verifique se o CSV está no repositório.';
                console.error(error);
            }
        }
        
        function processarCSV(data) {
            const linhas = data.split(/\r?\n/);
            const resultados = [];
            let combustivelAtual = '';
            
            for (let i = 0; i < linhas.length; i++) {
                const linha = linhas[i];
                if (linha.includes('Combustível:') && linha.includes('Tanques vinculados')) {
                    const match = linha.match(/Combustível:\s*(\d+\s*-\s*[^;]+)/);
                    if (match) combustivelAtual = match[1];
                    continue;
                }
                const colunas = linha.split(';');
                if (colunas[0] && colunas[0].match(/^\d{4}-\d{2}-\d{2}/)) {
                    resultados.push({
                        data: colunas[0],
                        combustivel: combustivelAtual,
                        saida_bombas: parseFloat(colunas[7]?.replace(/\./g, '').replace(',', '.') || 0),
                        diferenca: parseFloat(colunas[9]?.replace(/\./g, '').replace(',', '.') || 0)
                    });
                }
            }
            return resultados;
        }
        
        async function gerarGraficos(dados) {
            // Vendas por data
            const vendasPorData = {};
            dados.forEach(d => { vendasPorData[d.data] = (vendasPorData[d.data] || 0) + (d.saida_bombas || 0); });
            const datas = Object.keys(vendasPorData).sort().slice(-30);
            const vendas = datas.map(d => vendasPorData[d]);
            
            new Chart(document.getElementById('chartEvolucao'), {
                type: 'line', data: { labels: datas, datasets: [{ label: 'Vendas (L)', data: vendas, borderColor: '#e94560', fill: true }] }
            });
            
            // Distribuição por combustível
            const porCombustivel = {};
            dados.forEach(d => { if(d.combustivel) porCombustivel[d.combustivel] = (porCombustivel[d.combustivel] || 0) + (d.saida_bombas || 0); });
            new Chart(document.getElementById('chartDistribuicao'), {
                type: 'pie', data: { labels: Object.keys(porCombustivel), datasets: [{ data: Object.values(porCombustivel), backgroundColor: ['#e94560', '#0f3460', '#48bb78', '#ed8936'] }] }
            });
            
            // Top diferenças
            const topDiff = [...dados].sort((a,b) => Math.abs(b.diferenca) - Math.abs(a.diferenca)).slice(0,10);
            new Chart(document.getElementById('chartDiferencas'), {
                type: 'bar', data: { labels: topDiff.map(d => d.data), datasets: [{ label: 'Diferença (L)', data: topDiff.map(d => d.diferenca), backgroundColor: '#0f3460' }] }
            });
            
            // Performance
            const perf = {};
            dados.forEach(d => { if(d.combustivel) { perf[d.combustivel] = (perf[d.combustivel] || 0) + Math.abs(d.diferenca || 0); } });
            new Chart(document.getElementById('chartPerformance'), {
                type: 'bar', data: { labels: Object.keys(perf), datasets: [{ label: 'Diferença Média (L)', data: Object.values(perf).map(v => v / dados.filter(d=>d.combustivel===Object.keys(perf)[0]).length), backgroundColor: '#48bb78' }] }
            });
        }
        
        carregarDados();
    </script>
</body>
</html>
